<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect width="24" height="24" rx="6" fill="#173f39"/>
            <path d="M5 5.5h7M8.5 5.5v13M5.5 9h6M6.25 12.5h4.75M5.5 17.75c2.6-1.15 4.35-3.2 5.25-6.15M14.25 5.25h4.9l-.7 8.25M16.65 5.25c-.05 3.45-.55 6.15-1.5 8.1-.95 1.95-2.35 3.65-4.2 5.1M17.9 13.5c.7 2.1 1.75 3.8 3.15 5.1" stroke="#f5d879" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="app-name">Guan</span>
      </div>
      <button id="settings" title="设置" aria-label="设置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </header>

    <!-- Task list -->
    <section id="taskSection" class="task-section" hidden>
      <div id="taskList" class="task-list"></div>
    </section>

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab-item active" data-tab="current">当前页面</button>
      <button class="tab-item" data-tab="manual">手动链接</button>
    </div>

    <!-- Tab: current page -->
    <section class="tab-content" data-tab-content="current">
      <div class="target">
        <div class="target-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="target-text">
          <div id="title" class="title">—</div>
          <div id="url" class="url">—</div>
        </div>
      </div>

      <label class="oss-toggle">
        <input type="checkbox" id="ossEnabled" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label">同步到 OSS</span>
      </label>

      <button id="save" class="primary" type="button">
        <span class="btn-text">保存到 Obsidian</span>
      </button>
    </section>

    <!-- Tab: manual URL -->
    <section class="tab-content" data-tab-content="manual" hidden>
      <div class="manual-url">
        <div class="url-input-row">
          <input id="manualUrl" type="url" placeholder="https://example.com/article" spellcheck="false" autocomplete="off" />
        </div>
        <button id="saveManual" class="primary" type="button">
          <span class="btn-text">保存该链接</span>
        </button>
        <p id="manualError" class="error-text" hidden></p>
      </div>
    </section>

    <footer>
      <span id="health" class="health" data-ok="0">检查中...</span>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
