<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="url(#bolt)"/>
            <defs>
              <linearGradient id="bolt" x1="3" y1="2" x2="22" y2="22">
                <stop stop-color="#a78bfa"/>
                <stop offset="1" stop-color="#6366f1"/>
              </linearGradient>
            </defs>
          </svg>
        </span>
        <span class="app-name">LinkProcessing</span>
      </div>
      <button id="settings" title="设置" aria-label="设置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </header>

    <section class="target">
      <div class="target-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="target-text">
        <div id="title" class="title">—</div>
        <div id="url" class="url">—</div>
      </div>
    </section>

    <label class="oss-toggle">
      <input type="checkbox" id="ossEnabled" />
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-label">同步到 OSS</span>
    </label>

    <button id="save" class="primary" type="button">
      <span class="btn-text">保存到 Obsidian</span>
    </button>

    <footer>
      <span id="health" class="health" data-ok="0">检查中...</span>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
