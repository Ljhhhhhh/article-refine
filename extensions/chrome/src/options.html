<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LinkProcessingAgent Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>LinkProcessingAgent Settings</h1>

      <label>
        Server URL
        <input id="serverUrl" type="url" placeholder="http://127.0.0.1:8787" />
      </label>
      <p class="hint" id="hostHint"></p>

      <label>
        Bearer token
        <span class="muted">
          optional; must match <code>--token</code> on the server
        </span>
        <input id="token" type="password" placeholder="empty to disable auth" />
      </label>

      <label>
        Default duplicate policy
        <select id="duplicatePolicy">
          <option value="create">Create new</option>
          <option value="skip">Skip if exists</option>
          <option value="update">Update existing</option>
        </select>
      </label>

      <label class="inline">
        <input id="ossEnabled" type="checkbox" />
        Mirror to OSS by default (when the server is configured for it)
      </label>

      <div class="actions">
        <button id="save" class="primary" type="button">Save</button>
        <button id="test" type="button">Test connection</button>
      </div>

      <p id="status" class="status"></p>

      <section class="help">
        <h2>How to run the server</h2>
        <pre><code>pnpm build
node dist/cli/index.js serve --port 8787
# with auth:
node dist/cli/index.js serve --port 8787 --token &lt;secret&gt;</code></pre>

        <h2>Keyboard shortcut</h2>
        <p>
          Default: <kbd>Alt+Shift+S</kbd>. Customize at
          <code>chrome://extensions/shortcuts</code>.
        </p>
      </section>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
